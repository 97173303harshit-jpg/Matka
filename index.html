<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Number Dashboard</title>
    <style>
        /* Design part - Aapne pehle bhi CSS use ki hai */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            width: 320px;
        }
        h1 { font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 2px; }
        .number-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .details {
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }
        .status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 0.8rem; margin-bottom: 10px;">
        <span class="status"></span> LIVE UPDATES
    </div>
    <h1>special result</h1>
    
    <!-- image.png ke hisaab se Column B ka data yahan dikhega -->
    <div class="number-display" id="num">--</div>

    <div class="details">
        <p>Date: <span id="dt">--/--/--</span></p>
        <p>Time: <span id="tm">00:00</span></p>
    </div>
</div>

<script>
    // Is link ki jagah aapko apni published sheet ka CSV link daalna hoga
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9rXg8mUIY97uR1qYftu2mfpCGwk9YTwNO2K8OGxl1gp06rtt5vHoVFyRPiepuirieVWRbrODuTear/pub?output=csv";

    async function updateDashboard() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const rows = text.split('\n');
            const data = rows[1].split(',');

            // image.png ke columns ke hisaab se mapping
            document.getElementById('dt').innerText = data[0];  // Column A: Date
            document.getElementById('num').innerText = data[1]; // Column B: Number
            document.getElementById('tm').innerText = data[2];  // Column C: Time
        } catch (e) {
            console.log("Loading...");
        }
    }

    // Website khulte hi update karein
    updateDashboard();
    // Har 1 minute mein automatic naya data check karein
    setInterval(updateDashboard, 60000);
</script>

</body>
</html>
